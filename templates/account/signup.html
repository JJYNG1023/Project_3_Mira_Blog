{% extends "base.html" %}

{% block navbar %}
{% endblock %}

{% block content %}

<header>
    <nav class="navbar bg-light shadow-sm fixed-top">
        <div class="container-fluid position-relative justify-content-center py-3">
            <div>
                <a href="{% url 'home' %}" class="position-absolute start-0 top-50 translate-middle-y ms-3 text-dark fs-4" aria-label="Return to home">
                        <i class="bi bi-chevron-left"></i>
                </a>
            </div>
            <div>
                <h1>Register</h1>
            </div>
        </div>
    </nav>
</header>

<section class="container min-vh-100 d-flex justify-content-center align-items-start pt-5">

    <div class="card auth-card"> 
        <form method="post" action="{% url 'account_signup' %}">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <div class="mb-3">
                <label for="{{ form.username.id_for_label }}" class="form-label">User Name</label>
                <input 
                    type="text" 
                    name="{{ form.username.name }}" 
                    id="{{ form.username.id_for_label }}" 
                    class="form-control rounded-0 border-dark"
                    required>
                {{ form.username.errors }}
            </div>

            <div class="mb-3">
                <label for="{{ form.email.id_for_label }}" class="form-label">User Email</label>
                <input 
                    type="email" 
                    name="{{ form.email.name }}" 
                    id="{{ form.email.id_for_label }}" 
                    class="form-control rounded-0 border-dark"
                    required>
                {{ form.email.errors }}
            </div>

            <div class="mb-3">
                <label for="{{ form.password1.id_for_label }}" class="form-label">Password</label>
                <input 
                    type="password" 
                    name="{{ form.password1.name }}" 
                    id="{{ form.password1.id_for_label }}" 
                    class="form-control rounded-0 border-dark"
                    required>
                {{ form.password1.errors }}
            </div>

            <div class="mb-5">
                <label for="{{ form.password2.id_for_label }}" class="form-label">Re-enter Password</label>
                <input 
                    type="password" 
                    name="{{ form.password2.name }}" 
                    id="{{ form.password2.id_for_label }}" 
                    class="form-control rounded-0 border-dark"
                    required>
                {{ form.password2.errors }}
            </div>

            <div class="text-center">
                <button type="submit" class="btn fw-bold border-0">
                    Create Account
                </button>
            </div>
        </form>
    </div>

</section>

{% endblock %}
