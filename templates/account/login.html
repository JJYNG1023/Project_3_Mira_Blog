{% extends "base.html" %}

{% block navbar %}
{% endblock %}

{% block content %}


<header>
    <nav class="navbar bg-light shadow-sm fixed-top">
        <div class="container-fluid position-relative justify-content-center py-3">
            <div>
                <a href="{% url 'home' %}" class="position-absolute start-0 top-50 translate-middle-y ms-3 text-dark fs-4" aria-label="Return to home">
                        <i class="bi bi-chevron-left"></i>
                </a>
            </div>
            <div>
                <h1>Log in</h1>
            </div>
        </div>
    </nav>
</header>

<section class="container min-vh-100 d-flex justify-content-center align-items-start pt-5">

    <div class="card auth-card">

        <form method="post" action="{% url 'account_login' %}">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <div class="mb-4">
                <label for="{{ form.login.id_for_label }}" class="form-label">User Name</label>
                <input 
                    type="text" 
                    name="{{ form.login.name }}" 
                    id="{{ form.login.id_for_label }}" 
                    class="form-control rounded-0 border-dark"
                    required>
                {{ form.login.errors }}
            </div>

            <div class="mb-2">
                <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
                <input 
                    type="password" 
                    name="{{ form.password.name }}" 
                    id="{{ form.password.id_for_label }}" 
                    class="form-control rounded-0 border-dark"
                    required>
                {{ form.password.errors }}
            </div>

            {% if form.remember %}
                <div class="form-check text-end mb-5">
                    {{ form.remember }}
                    <label class="form-check-label" for="{{ form.remember.id_for_label }}">
                        Remember me
                    </label>
                </div>
            {% endif %}

            <div class="text-center">
                <button type="submit" class="navbar-brand mx-auto auth-btn">
                    Login
                </button>
            </div>
        </form>

        <div class="text-center mt-5">
            <a href="{% url 'account_signup' %}" class="text-dark text-decoration-none">
                Sign up for Account
            </a>
        </div>

    </div>

</section>

{% endblock %}
